<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Pushbridge</title>
    <link rel="stylesheet" href="extension.css">
  </head>
  <body>
    <main>
      <div>
        <h1>Pushbridge</h1>
        <p class="muted">暗号化して自分の端末へ送信</p>
      </div>
      <div id="status" class="status">状態を確認中…</div>
      <section class="card">
        <label>送信先
          <select id="target"></select>
        </label>
        <div class="row">
          <button id="send-tab" type="button">現在のタブ</button>
          <button id="refresh" class="secondary" type="button">更新</button>
        </div>
      </section>
      <section class="card">
        <h2>Note</h2>
        <label>タイトル<input id="note-title" maxlength="200"></label>
        <label>本文<textarea id="note-body" maxlength="10000"></textarea></label>
        <button id="send-note" type="button">Noteを送信</button>
      </section>
      <section class="card">
        <h2>Link</h2>
        <label>タイトル<input id="link-title" maxlength="200"></label>
        <label>URL<input id="link-url" type="url"></label>
        <button id="send-link" type="button">Linkを送信</button>
      </section>
      <section class="card">
        <div class="row"><h2>最近の履歴</h2><a href="options.html" target="_blank">設定</a></div>
        <ul id="history" class="history"><li>読み込み中…</li></ul>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
