name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract-server-client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-pwa/package-lock.json
      - name: Install server
        run: |
          python -m venv .runtime/venv
          .runtime/venv/bin/pip install -e 'services/relaymock[dev]'
      - name: Install client
        run: cd apps/web-pwa && npm ci
      - name: Contract and unit checks
        run: make check
      - name: Full-stack HTTP smoke test
        run: make smoke
