name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract-server-client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web-pwa/package-lock.json
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false
      - name: Install server
        run: |
          python -m venv .runtime/venv
          .runtime/venv/bin/pip install -e 'services/relaymock[dev]'
      - name: Install Node workspaces
        run: |
          npm ci
          npm ci --prefix apps/web-pwa
      - name: Initialize Terraform providers without backend
        run: terraform -chdir=infra/cloudflare/infra init -backend=false
      - name: Install Playwright Chromium
        run: npm run --prefix apps/web-pwa test:e2e:install
      - name: Contract, unit, PWA build, and Terraform checks
        run: npm run check
      - name: Full-stack HTTP smoke test
        run: make smoke
      - name: Local Cloudflare Worker and PWA smoke test
        run: npm run cloudflare:local:smoke
      - name: Local D1 export and restore recovery drill
        run: npm run cloudflare:local:recovery-drill
      - name: Browser PWA end-to-end test
        run: npm run --prefix apps/web-pwa test:e2e
      - name: Browser Passkey and cookie-session end-to-end test
        run: npm run cloudflare:local:passkey-e2e
      - name: Chromium extension local integration test
        run: npm run extension:e2e:local
